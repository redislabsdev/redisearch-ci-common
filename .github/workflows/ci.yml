name: CI

# Validates this repo's own building blocks so a PR can't silently break a
# consumed workflow/action/script. Runs on PRs and pushes to main.
#   - actionlint: workflow syntax, expression + context checks, shellcheck of run steps.
#   - strict YAML: parse + reject duplicate mapping keys across workflows AND
#     composite actions (actionlint doesn't lint action.yml files).
#   - compileall: every Python helper compiles.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Compile Python helpers
        run: python -m compileall -q scripts

      - name: Validate YAML (parse + reject duplicate keys)
        run: |
          python -m pip install --quiet pyyaml
          python3 - <<'PY'
          import glob, sys, yaml
          from yaml.constructor import ConstructorError

          class StrictLoader(yaml.SafeLoader):
              pass

          def no_duplicates(loader, node, deep=False):
              seen = set()
              for key_node, _ in node.value:
                  key = loader.construct_object(key_node, deep=deep)
                  if key in seen:
                      raise ConstructorError(
                          None, None, f"duplicate key {key!r}", key_node.start_mark)
                  seen.add(key)
              return yaml.SafeLoader.construct_mapping(loader, node, deep)

          StrictLoader.add_constructor(
              yaml.resolver.BaseResolver.DEFAULT_MAPPING_TAG, no_duplicates)

          files = sorted(set(
              glob.glob('.github/**/*.yml', recursive=True)
              + glob.glob('.github/**/*.yaml', recursive=True)))
          failed = False
          for f in files:
              try:
                  with open(f) as fh:
                      yaml.load(fh, Loader=StrictLoader)
              except Exception as e:
                  failed = True
                  print(f"FAIL {f}: {e}")
              else:
                  print(f"ok   {f}")
          sys.exit(1 if failed else 0)
          PY

      # Pinned to a release tag (download script + binary version both v1.7.7),
      # so the linter version can't drift under us.
      - name: Install actionlint
        run: bash <(curl -fsSL https://raw.githubusercontent.com/rhysd/actionlint/v1.7.7/scripts/download-actionlint.bash) 1.7.7

      - name: Run actionlint
        run: ./actionlint -color
