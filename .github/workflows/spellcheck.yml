name: Spellcheck (reusable)

# Run codespell over the files a PR changed relative to its base branch.
# Reusable: callers add a thin caller that `uses:` this one. Each repo supplies
# its own codespell config (default: a `.codespell/` directory with
# `requirements.txt` and `.codespellrc`) — that config is repo-specific, the
# workflow is not.

on:
  workflow_call:
    inputs:
      base-ref:
        description: "Branch to diff against. Default: the repo's default branch."
        type: string
        default: ""
      config:
        description: codespell config file.
        type: string
        default: .codespell/.codespellrc
      requirements:
        description: pip requirements file pinning codespell.
        type: string
        default: .codespell/requirements.txt
      runs-on:
        type: string
        default: ubuntu-slim

permissions:
  contents: read

jobs:
  spellcheck:
    runs-on: ${{ inputs.runs-on }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install codespell
        run: pip install -r ${{ inputs.requirements }}

      - name: Run codespell on changed files
        env:
          OVERRIDE_BASE: ${{ inputs.base-ref }}
          MERGE_GROUP_BASE: ${{ github.event.merge_group.base_ref }}
          PR_BASE: ${{ github.base_ref }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          CONFIG: ${{ inputs.config }}
        run: |
          # Resolve the base to diff against: explicit input, then the merge-queue
          # target (github.base_ref is unset on merge_group events), then the PR
          # base, then the repo default branch.
          if [ -n "${OVERRIDE_BASE}" ]; then base="${OVERRIDE_BASE}"
          elif [ -n "${MERGE_GROUP_BASE}" ]; then base="${MERGE_GROUP_BASE#refs/heads/}"
          elif [ -n "${PR_BASE}" ]; then base="${PR_BASE}"
          else base="${DEFAULT_BRANCH}"; fi
          git fetch origin "${base}"
          # NUL-delimit so changed paths containing spaces aren't split by xargs.
          git diff -z --name-only "origin/${base}" --diff-filter=AM \
            | xargs -0 -r codespell --config "${CONFIG}"
