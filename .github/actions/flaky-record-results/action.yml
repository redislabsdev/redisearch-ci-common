name: Record test results to flaky DB
description: |
  Record test results from the current CI run to the flaky-test Redis DB
  (the same REPO/BRANCH-keyed DB used by the flaky-mark / flaky-unmark workflows).

  Accepts two simple file inputs — one test id per line:
    - failed-file: the failing test ids (RLTest's FAILEDFILE gives these)
    - passed-file: optional; only if your runner produces it

  This action never fails the job: it warns on connection errors so a flaky-DB
  outage cannot break the test pipeline. The calling step should set
  `if: always()` so failures are recorded even when tests fail. The DB CLI
  (scripts/ci_common/flaky_db.py) is bundled in this repo, so the action is
  self-contained.

inputs:
  redis-url:
    description: "Redis connection URL (rediss://...). Recording is a no-op if empty."
    required: true
  failed-file:
    description: "Path to a file listing failing test ids, one per line"
    required: false
    default: ""
  passed-file:
    description: "Path to a file listing passing test ids, one per line"
    required: false
    default: ""
  branch:
    description: "Branch the run is associated with. Defaults to the PR base / ref name."
    required: false
    default: ""
  job-name:
    description: "Short label for this job/shard, recorded with each result"
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Resolve target branch
      # Prefer an explicit branch, then the merge-queue base, then the PR base,
      # then the current ref — so results are attributed to the right line.
      shell: bash -l -eo pipefail {0}
      env:
        OVERRIDE: ${{ inputs.branch }}
        MERGE_GROUP_BASE: ${{ github.event.merge_group.base_ref }}
        BASE_REF: ${{ github.base_ref }}
        REF_NAME: ${{ github.ref_name }}
      run: |
        if [ -n "$OVERRIDE" ]; then
          branch="$OVERRIDE"
        elif [ -n "$MERGE_GROUP_BASE" ]; then
          branch="${MERGE_GROUP_BASE#refs/heads/}"
        elif [ -n "$BASE_REF" ]; then
          branch="$BASE_REF"
        else
          branch="$REF_NAME"
        fi
        echo "Resolved flaky target branch: $branch"
        echo "FLAKY_BRANCH=$branch" >> "$GITHUB_ENV"

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.x"

    - name: Install dependencies
      shell: bash -l -eo pipefail {0}
      run: pip install 'redis>=6,<7'

    - name: Record results
      shell: bash -l -eo pipefail {0}
      env:
        REDIS_URL: ${{ inputs.redis-url }}
        REPO: ${{ github.repository }}
        BRANCH: ${{ env.FLAKY_BRANCH }}
        COMMIT: ${{ github.sha }}
        WORKFLOW_RUN_ID: ${{ github.run_id }}
        RUN_ATTEMPT: ${{ github.run_attempt }}
        JOB_NAME: ${{ inputs.job-name != '' && inputs.job-name || github.job }}
        FAILED_FILE: ${{ inputs.failed-file }}
        PASSED_FILE: ${{ inputs.passed-file }}
      # flaky_db.py is bundled in this repo; reference it relative to the action
      # (action_path -> .github/actions/flaky-record-results, so go up 3 to root).
      run: python3 "${{ github.action_path }}/../../../scripts/ci_common/flaky_db.py" record
